<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flappy Bird">
<meta name="theme-color" content="#100a24">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --sat: env(safe-area-inset-top, 0px); }
  html, body {
    height: 100%;
    height: -webkit-fill-available;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #100a24;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body { position: fixed; inset: 0; }
  #game-wrap {
    position: relative;
    width: min(400px, 100vw);
    height: min(600px, 100vh);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border-radius: 12px;
    overflow: hidden;
  }
  /* Op telefoons: volledig scherm vullen, geen randen boven/onder */
  @media (max-width: 600px) {
    #game-wrap {
      width: 100vw;
      height: 100vh;   /* fallback */
      height: 100dvh;  /* dynamische viewport (verbergt iOS-balk netjes) */
      border-radius: 0;
      box-shadow: none;
    }
  }
  canvas#canvas { display: block; width: 100%; height: 100%; background: #70c5ce; touch-action: none; }

  /* Overlay schermen */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #fff;
    text-align: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(2px);
    transition: opacity .25s;
    overflow-y: auto;
    padding:
      max(14px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      max(14px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  h1 {
    font-size: 42px;
    letter-spacing: 1px;
    text-shadow: 3px 3px 0 #d35400, 5px 5px 0 rgba(0,0,0,0.3);
    color: #ffd54a;
  }
  h2 { font-size: 30px; text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
  p { font-size: 15px; opacity: .9; }

  .btn {
    cursor: pointer;
    border: none;
    padding: 13px 32px;
    font-size: 19px;
    font-weight: 700;
    border-radius: 999px;
    background: #ffd54a;
    color: #5a3d00;
    box-shadow: 0 5px 0 #c79b1f;
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #c79b1f; }
  .btn.secondary { background: #fff; color: #2c3e50; box-shadow: 0 5px 0 #b3b3b3; }

  .difficulty { display: flex; gap: 10px; align-items: center; }
  .difficulty .lbl { font-size: 13px; opacity: .8; }
  .diff-btn, .mode-btn {
    cursor: pointer;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    transition: .15s;
  }
  .diff-btn.active, .mode-btn.active { background: #fff; color: #2c3e50; }
  .mode-btn.active[data-mode="chaos"] { background: #ff5a8a; color: #fff; border-color: #ff5a8a; }

  .score-box { font-size: 22px; font-weight: 700; }
  .best { font-size: 16px; opacity: .85; }

  /* Muntbalk */
  .coinbar {
    font-size: 20px; font-weight: 800; color: #ffd54a;
    background: rgba(0,0,0,0.3); padding: 6px 18px; border-radius: 999px;
  }

  /* Winkel */
  .tabs { display: flex; gap: 8px; }
  .tab {
    cursor: pointer; border: 2px solid #fff; background: transparent; color: #fff;
    padding: 6px 20px; border-radius: 999px; font-size: 15px; font-weight: 700; transition: .15s;
  }
  .tab.active { background: #fff; color: #2c3e50; }

  .shop-items { display: flex; flex-direction: column; gap: 12px; width: 310px; max-width: 90%; }
  .item {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px; padding: 10px 12px;
  }
  .item.selected { border-color: #ffd54a; background: rgba(255,213,74,0.16); }
  .item-prev { width: 56px; height: 56px; border-radius: 10px; background: rgba(0,0,0,0.25); flex: 0 0 auto; }
  .item-info { flex: 1; text-align: left; min-width: 0; }
  .item-name { font-size: 16px; font-weight: 700; }
  .item-sub { font-size: 13px; opacity: .8; }
  .item-btn {
    cursor: pointer; border: none; border-radius: 999px; padding: 8px 14px;
    font-size: 14px; font-weight: 700; background: #ffd54a; color: #5a3d00; flex: 0 0 auto;
  }
  .item-btn.owned { background: #fff; color: #2c3e50; }
  .item-btn.selected { background: #5ec64a; color: #fff; cursor: default; }
  .item-btn.locked { background: #e74c3c; color: #fff; }
  .item-btn:disabled { opacity: .6; cursor: not-allowed; }

  /* Profielen / login */
  .playerbar {
    font-size: 16px; font-weight: 700; color: #fff;
    background: rgba(0,0,0,0.3); padding: 6px 16px; border-radius: 999px;
  }
  .textlink {
    background: none; border: none; color: #fff; opacity: .85;
    text-decoration: underline; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .profile-list { display: flex; flex-direction: column; gap: 10px; width: 300px; max-width: 88%; }
  .profile-row { display: flex; gap: 8px; align-items: stretch; }
  .profile-pick {
    flex: 1; display: flex; flex-direction: column; align-items: flex-start;
    padding: 10px 18px; font-size: 18px; line-height: 1.1;
  }
  .profile-pick small { font-size: 12px; font-weight: 600; opacity: .7; color: #5a3d00; }
  .profile-del {
    flex: 0 0 auto; width: 44px; border: none; border-radius: 14px; cursor: pointer;
    background: rgba(231,76,60,0.85); color: #fff; font-size: 18px; font-weight: 700;
  }
  .new-profile { display: flex; gap: 8px; width: 300px; max-width: 88%; }
  .new-profile input {
    flex: 1; min-width: 0; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.12);
    color: #fff; border-radius: 999px; padding: 10px 16px; font-size: 15px; outline: none;
  }
  .new-profile input::placeholder { color: rgba(255,255,255,0.6); }
  .new-profile .btn { padding: 10px 18px; font-size: 15px; }

  /* Instellingen */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 280px; max-width: 88%;
    background: rgba(255,255,255,0.1); border-radius: 14px;
    padding: 12px 18px; font-size: 17px; font-weight: 600;
  }
  .toggle {
    width: 54px; height: 30px; border-radius: 999px; border: none; cursor: pointer;
    background: #777; position: relative; transition: background .15s; flex: 0 0 auto;
  }
  .toggle.on { background: #5ec64a; }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px;
    border-radius: 50%; background: #fff; transition: left .15s;
  }
  .toggle.on::after { left: 27px; }

  /* Game over extra's */
  #medal-canvas { width: 80px; height: 80px; }
  .newbest {
    font-size: 16px; font-weight: 800; color: #ffd54a; letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255,213,74,0.7);
    animation: pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  #medal-canvas.hidden, #newbest.hidden { display: none; }

  /* Menu-rij met twee knoppen */
  .menu-row { display: flex; gap: 8px; align-items: stretch; }
  .btn.small { padding: 12px 18px; font-size: 16px; }

  /* Toast-meldingen */
  .toast {
    position: absolute; top: 14%; left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: rgba(18,18,28,0.94); color: #fff; padding: 10px 18px;
    border-radius: 14px; border: 2px solid #ffd54a; font-weight: 700; font-size: 15px;
    opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none;
    z-index: 20; text-align: center; max-width: 84%; line-height: 1.3;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.hidden { display: none; }

  /* Prestatielijst */
  .ach-list { display: flex; flex-direction: column; gap: 8px; width: 320px; max-width: 90%; overflow-y: auto; max-height: 62vh; }
  .ach-item {
    display: flex; align-items: center; gap: 10px; text-align: left;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 9px 12px;
  }
  .ach-item.done { border-color: #ffd54a; background: rgba(255,213,74,0.14); }
  .ach-icon { font-size: 22px; flex: 0 0 auto; width: 28px; text-align: center; filter: grayscale(1) opacity(0.5); }
  .ach-item.done .ach-icon { filter: none; }
  .ach-info { flex: 1; min-width: 0; }
  .ach-name { font-size: 15px; font-weight: 700; }
  .ach-desc { font-size: 12px; opacity: .8; }
  .ach-reward { font-size: 13px; font-weight: 700; color: #ffd54a; flex: 0 0 auto; }

  /* Pauzeknop */
  .pause-btn {
    position: absolute; top: calc(10px + env(safe-area-inset-top)); right: 12px;
    width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer;
    background: rgba(0,0,0,0.35); color: #fff; font-size: 16px; z-index: 8;
    display: flex; align-items: center; justify-content: center;
  }
  .pause-btn.hidden { display: none; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="canvas" width="400" height="600"></canvas>
  <div id="toast" class="toast hidden"></div>
  <button id="pause-btn" class="pause-btn hidden" aria-label="Pauze">⏸</button>

  <!-- Pauze -->
  <div id="paused" class="screen hidden">
    <h2>Gepauzeerd</h2>
    <button class="btn" id="resume-btn">▶ Verder</button>
    <button class="btn secondary" id="pause-menu-btn">Menu</button>
  </div>

  <!-- Login / spelerselectie -->
  <div id="login" class="screen hidden">
    <h1>Flappy Bird</h1>
    <p>Kies je speler</p>
    <div id="profile-list" class="profile-list"></div>
    <div class="new-profile">
      <input id="new-name" type="text" maxlength="16" placeholder="Nieuwe spelersnaam" autocomplete="off">
      <button class="btn" id="add-profile">+ Toevoegen</button>
    </div>
  </div>

  <!-- Menu -->
  <div id="menu" class="screen">
    <h1>Flappy Bird</h1>
    <div class="playerbar">👤 <span id="menu-name">—</span> · 🪙 <span id="menu-coins">0</span></div>
    <div class="difficulty" id="difficulty">
      <button class="diff-btn" data-diff="easy">Makkelijk</button>
      <button class="diff-btn active" data-diff="normal">Normaal</button>
      <button class="diff-btn" data-diff="hard">Moeilijk</button>
    </div>
    <div class="difficulty" id="modesel">
      <button class="mode-btn active" data-mode="classic">Klassiek</button>
      <button class="mode-btn" data-mode="chaos">⚡ Chaos</button>
      <button class="mode-btn" data-mode="time">⏱ Time</button>
    </div>
    <button class="btn" id="play-btn">▶ Spelen</button>
    <button class="btn secondary" id="shop-btn">🛒 Winkel</button>
    <div class="menu-row">
      <button class="btn secondary small" id="ach-btn">🏆 Prestaties</button>
      <button class="btn secondary small" id="settings-btn">⚙️</button>
    </div>
    <p class="best">Beste score: <span id="menu-best">0</span></p>
    <button class="textlink" id="switch-btn">Wissel speler</button>
  </div>

  <!-- Prestaties -->
  <div id="achievements" class="screen hidden">
    <h2>Prestaties</h2>
    <div id="ach-list" class="ach-list"></div>
    <button class="btn secondary" id="ach-back">← Terug</button>
  </div>

  <!-- Instellingen -->
  <div id="settings" class="screen hidden">
    <h2>Instellingen</h2>
    <div class="setting-row"><span>🔊 Geluid</span><button class="toggle" id="toggle-sound" aria-label="Geluid"></button></div>
    <div class="setting-row"><span>📳 Trillen</span><button class="toggle" id="toggle-haptics" aria-label="Trillen"></button></div>
    <button class="btn secondary" id="settings-back">← Terug</button>
  </div>

  <!-- Winkel -->
  <div id="shop" class="screen hidden">
    <h2>Winkel</h2>
    <div class="coinbar">🪙 <span id="shop-coins">0</span></div>
    <div class="tabs">
      <button class="tab active" data-tab="skins">Vogels</button>
      <button class="tab" data-tab="themes">Thema's</button>
    </div>
    <div id="shop-items" class="shop-items"></div>
    <button class="btn secondary" id="shop-back">← Terug</button>
  </div>

  <!-- Game over -->
  <div id="gameover" class="screen hidden">
    <h2 id="go-title">Game Over</h2>
    <canvas id="medal-canvas" width="80" height="80" class="hidden"></canvas>
    <div id="newbest" class="newbest hidden">★ NIEUW RECORD ★</div>
    <div class="score-box">Score: <span id="final-score">0</span></div>
    <div class="best">Beste: <span id="best-score">0</span></div>
    <div class="best">🪙 verzameld: <span id="run-coins">0</span></div>
    <button class="btn" id="retry-btn">↻ Opnieuw</button>
    <button class="btn secondary" id="menu-btn">Menu</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('game-wrap');
const DPR = Math.min(window.devicePixelRatio || 1, 3);

// De logische breedte is altijd 400 (zo voelt alles even groot op elk toestel);
// de hoogte neemt de échte schermverhouding aan, zodat het beeld het hele
// scherm vult zonder randen en zonder vervorming. uiTop houdt de score/munten
// onder de notch vandaan.
let W = 400, H = 600, uiTop = 0;
function resize() {
  const rect = wrap.getBoundingClientRect();
  const cssW = rect.width || 400, cssH = rect.height || 600;
  W = 400;
  H = Math.round(400 * cssH / cssW);
  canvas.width = Math.round(cssW * DPR);
  canvas.height = Math.round(cssH * DPR);
  const s = canvas.width / W; // gelijk voor x en y -> geen vervorming
  ctx.setTransform(s, 0, 0, s, 0, 0);
  const satCss = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sat')) || 0;
  uiTop = satCss * W / cssW;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

const menuEl = document.getElementById('menu');
const shopEl = document.getElementById('shop');
const gameoverEl = document.getElementById('gameover');

// Moeilijkheidsinstellingen
// gravity/jump/speed in eenheden per vaste tik (60/sec). coinValue = munten per opgepakte munt.
const DIFFS = {
  easy:   { gap: 185, gravity: 0.30, jump: -6.8, speed: 2.7, interval: 85, maxVy: 8.5, coinValue: 1 },
  normal: { gap: 158, gravity: 0.36, jump: -7.2, speed: 3.2, interval: 72, maxVy: 9.0, coinValue: 2 },
  hard:   { gap: 132, gravity: 0.42, jump: -7.8, speed: 3.8, interval: 60, maxVy: 9.5, coinValue: 3 },
};
let diff = 'normal';
let mode = 'classic'; // classic | chaos | time
let curSpeed = 2.2;   // huidige (oplopende) snelheid
let timeLeft = 0;     // resterende tikken in Time Attack

// Skins & thema's (prijs in munten; 0 = gratis)
const SKINS = {
  classic: { name: 'Klassieke Vogel', price: 0,   desc: 'De gele klassieker' },
  phoenix: { name: 'Vuurvogel',       price: 100, desc: 'Feniks met vlammenstaart' },
  robot:   { name: 'Robovogel',       price: 300, desc: 'Metaal met gloeiend LED-oog' },
  ghost:   { name: 'Spookje',         price: 400, desc: 'Doorschijnend & spookachtig' },
  ninja:   { name: 'Ninja',           price: 500, desc: 'Masker & wapperende hoofdband' },
  knight:  { name: 'Black Knight',    price: 750, desc: 'Donkere ridder met cape' },
};
const THEMES = {
  classic: { name: 'Klassiek',        price: 0,    desc: 'Heldere lucht & groene buizen' },
  sunset:  { name: 'Zonsondergang',   price: 100,  desc: 'Warme avondlucht & silhouetten' },
  space:   { name: 'Ruimte',          price: 250,  desc: 'Sterren, planeten & metaal' },
  ocean:   { name: 'Onderwater',      price: 350,  desc: 'Zeebodem, koraal & bubbels' },
  neon:    { name: 'Neon Stad',       price: 500,  desc: 'Cyberpunk met gloeiende buizen' },
  dark:    { name: 'Donker Kasteel',  price: 1000, desc: 'Nacht, maan & kasteelmuren' },
};

// --- Opgeslagen voortgang (per speler-profiel) ---
function loadList(key, def) {
  try { const v = JSON.parse(localStorage.getItem(key)); return Array.isArray(v) ? v : def.slice(); }
  catch (e) { return def.slice(); }
}

let profiles = {};
try { profiles = JSON.parse(localStorage.getItem('flappyProfiles')) || {}; } catch (e) { profiles = {}; }
let activeProfile = localStorage.getItem('flappyActiveProfile');

// Eenmalige migratie van de oude (profielloze) opslag naar 'Speler 1'
if (Object.keys(profiles).length === 0 && localStorage.getItem('flappyCoins') !== null) {
  profiles['Speler 1'] = {
    coins: parseInt(localStorage.getItem('flappyCoins') || '0', 10),
    best: parseInt(localStorage.getItem('flappyBest') || '0', 10),
    ownedSkins: loadList('flappySkins', ['classic']),
    ownedThemes: loadList('flappyThemes', ['classic']),
    selSkin: localStorage.getItem('flappySelSkin') || 'classic',
    selTheme: localStorage.getItem('flappySelTheme') || 'classic',
  };
  activeProfile = 'Speler 1';
  localStorage.setItem('flappyProfiles', JSON.stringify(profiles));
}

// Huidige spelergegevens (door de rest van het spel gebruikt)
let best = 0, coins = 0;
let ownedSkins = ['classic'], ownedThemes = ['classic'];
let selectedSkin = 'classic', selectedTheme = 'classic';
let stats = { games: 0, totalCoins: 0, powerups: 0 };
let achievements = [];

function defaultProfileData() {
  return { coins: 0, best: 0, ownedSkins: ['classic'], ownedThemes: ['classic'], selSkin: 'classic', selTheme: 'classic',
           stats: { games: 0, totalCoins: 0, powerups: 0, dailyDate: '', streak: 0 }, achievements: [] };
}

// schrijf de huidige gegevens terug naar het actieve profiel
function persist() {
  if (!activeProfile) return;
  profiles[activeProfile] = {
    coins: coins, best: best,
    ownedSkins: ownedSkins, ownedThemes: ownedThemes,
    selSkin: selectedSkin, selTheme: selectedTheme,
    stats: stats, achievements: achievements,
  };
  localStorage.setItem('flappyProfiles', JSON.stringify(profiles));
  localStorage.setItem('flappyActiveProfile', activeProfile);
}

// laad het actieve profiel in de globale variabelen
function loadActive() {
  const d = profiles[activeProfile] || defaultProfileData();
  coins = d.coins || 0;
  best = d.best || 0;
  ownedSkins = Array.isArray(d.ownedSkins) ? d.ownedSkins.slice() : ['classic'];
  ownedThemes = Array.isArray(d.ownedThemes) ? d.ownedThemes.slice() : ['classic'];
  if (!ownedSkins.includes('classic')) ownedSkins.unshift('classic');
  if (!ownedThemes.includes('classic')) ownedThemes.unshift('classic');
  selectedSkin = ownedSkins.includes(d.selSkin) ? d.selSkin : 'classic';
  selectedTheme = ownedThemes.includes(d.selTheme) ? d.selTheme : 'classic';
  const st = d.stats || {};
  stats = { games: st.games || 0, totalCoins: st.totalCoins || 0, powerups: st.powerups || 0,
            dailyDate: st.dailyDate || '', streak: st.streak || 0 };
  achievements = Array.isArray(d.achievements) ? d.achievements.slice() : [];
}

// ====================== GELUID & HAPTIEK ======================
// Volledig gesynthetiseerd via Web Audio (geen externe bestanden -> blijft één deelbaar bestand).
let audioCtx = null;
let soundOn = localStorage.getItem('flappySound') !== '0';
let hapticsOn = localStorage.getItem('flappyHaptics') !== '0';
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, dur, type, vol, slideTo, delay) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol || 0.2, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}
function noiseBurst(dur, vol) {
  if (!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const n = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  n.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol || 0.3, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  n.connect(g); g.connect(audioCtx.destination); n.start(t); n.stop(t + dur);
}
function sfx(name) {
  if (!soundOn) return;
  ensureAudio();
  switch (name) {
    case 'flap':  tone(420, 0.11, 'square', 0.12, 640); break;
    case 'score': tone(680, 0.10, 'square', 0.16, 1000); break;

let toastQ = [], toastBusy = false;

// Dagelijkse bonus met oplopende dag-reeks
function claimDaily() {
  const now = new Date();
  const today = now.toISOString().slice(0, 10);
  if (stats.dailyDate === today) return; // vandaag al ontvangen
  const y = new Date(now); y.setDate(y.getDate() - 1);
  const yesterday = y.toISOString().slice(0, 10);
  stats.streak = (stats.dailyDate === yesterday) ? (stats.streak + 1) : 1;
  stats.dailyDate = today;
  const bonus = 25 * Math.min(stats.streak, 7);
  coins += bonus;
  persist(); updateCoinUI();
  queueToast({ name: 'Dagelijkse bonus 🎁', desc: 'Dag-reeks: ' + stats.streak + ' dag' + (stats.streak === 1 ? '' : 'en'), reward: bonus });
}

function spawnParticles(x, y, n, opts) {
  opts = opts || {};
  for (let i = 0; i < n; i++) {
    const ang = opts.ang != null ? opts.ang + (Math.random()-0.5)*(opts.spread||Math.PI*2) : Math.random()*Math.PI*2;
    const spd = (opts.spdMin||0.5) + Math.random()*((opts.spdMax||3)-(opts.spdMin||0.5));
    const life = (opts.lifeMin||20) + Math.random()*((opts.lifeMax||40)-(opts.lifeMin||20));
    particles.push({
      x: x, y: y,
      vx: Math.cos(ang)*spd + (opts.vx||0),
      vy: Math.sin(ang)*spd + (opts.vy||0),
      g: opts.g != null ? opts.g : 0.12,
      life: life, maxLife: life,
      size: (opts.sizeMin||1.5) + Math.random()*((opts.sizeMax||4)-(opts.sizeMin||1.5)),
      color: Array.isArray(opts.colors) ? opts.colors[(Math.random()*opts.colors.length)|0] : (opts.color||'#fff'),
    });
  }
}
function spawnPopup(x, y, text, color) {
  popups.push({ x: x, y: y, text: text, color: color || '#fff', life: 45, maxLife: 45 });
}
function updateParticles() {
  if (shake > 0) { shake *= 0.88; if (shake < 0.3) shake = 0; }
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = popups.length-1; i >= 0; i--) {
    const q = popups[i];
    q.y -= 0.8; q.life--;
    if (q.life <= 0) popups.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  for (const q of popups) {
    const a = Math.max(0, q.life / q.maxLife);
    ctx.globalAlpha = a;
    ctx.font = 'bold 20px Segoe UI, sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.strokeText(q.text, q.x, q.y); ctx.fillStyle = q.color; ctx.fillText(q.text, q.x, q.y);
  }
  ctx.globalAlpha = 1;
}

function spawnPipe() {
  const margin = 60;
  const groundY = H - 50;
  // opening krimpt langzaam met de score (moeilijkheidsopbouw)
  const gapNow = settings.gap - Math.min(score * 0.6, 26);
  const half = gapNow / 2;
  const minC = margin + half;                 // hoogste midden (opening niet door plafond)
  const maxC = groundY - margin - half;       // laagste midden (opening niet in grond)
  // Maximaal haalbare verticale verschuiving tussen twee opeenvolgende openingen,
  // afgeleid van hoe hoog de vogel kan klimmen in de tijd tussen twee buizen.
  const maxShift = Math.min(0.45 * Math.abs(settings.jump) * settings.interval, maxC - minC);
  let center;
  if (lastGapCenter == null) {
    center = minC + Math.random() * (maxC - minC);
  } else {
    const lo = Math.max(minC, lastGapCenter - maxShift);
    const hi = Math.min(maxC, lastGapCenter + maxShift);
    center = lo + Math.random() * (hi - lo);
  }
  lastGapCenter = center;
  const p = { x: W, prevX: W, top: center - half, gap: gapNow, passed: false, coin: true, power: null,
              baseTop: center - half, driftAmp: 0, driftPhase: Math.random()*Math.PI*2 };
  // Chaos-modus: de opening beweegt op en neer (binnen veilige grenzen)
  if (mode === 'chaos') {
    const room = Math.min(center - minC, maxC - center);
    p.driftAmp = Math.max(0, Math.min(room, 34 + Math.random()*28));
  }
  // af en toe een power-up in plaats van een munt
  if (frame > 180 && Math.random() < 0.14) { p.power = randomPower(); p.coin = false; }
  pipes.push(p);
}

const MEDAL_COLORS = {
  bronze:   ['#e8a060', '#a05a2c'],

  gold:     ['#ffe082', '#d4a017'],
  platinum: ['#eef0ff', '#8fa6c9'],
};
function medalTier(s) {
  if (s >= 50) return 'platinum';
  if (s >= 30) return 'gold';
  if (s >= 15) return 'silver';
  if (s >= 5)  return 'bronze';
  return null;
}
function drawMedal(c, tier) {
  c.clearRect(0, 0, 80, 80);

  // lint
  c.fillStyle = '#3a6ea5'; c.fillRect(28, 4, 9, 26);
  c.fillStyle = '#2a527e'; c.fillRect(43, 4, 9, 26);
  // schijf
  const g = c.createRadialGradient(32, 34, 4, 40, 46, 34);
  g.addColorStop(0, cols[0]); g.addColorStop(1, cols[1]);
  c.fillStyle = g;
  c.beginPath(); c.arc(40, 48, 26, 0, Math.PI*2); c.fill();
  c.lineWidth = 3; c.strokeStyle = 'rgba(255,255,255,0.55)'; c.stroke();
  // ster
  c.fillStyle = 'rgba(255,255,255,0.9)';

// botsing afhandelen: schild en Time-modus geven geen permadeath
function handleHit() {
  if (invulnTimer > 0) return;
  if (shieldActive) {
    shieldActive = false; invulnTimer = 50;
    sfx('hit'); haptic(30); shake = 8; bird.vy = settings.jump * 0.7;
    spawnParticles(bird.x, bird.y, 18, { colors: ['#3aa0ff','#bfe0ff','#fff'], spdMin: 1.5, spdMax: 4.5, g: 0.05, lifeMin: 18, lifeMax: 34, sizeMin: 1.5, sizeMax: 3.5 });
    spawnPopup(bird.x, bird.y - 18, 'SCHILD WEG!', '#3aa0ff');
    return;
  }
  if (mode === 'time') {
    timeLeft = Math.max(0, timeLeft - 180); invulnTimer = 45;
    sfx('hit'); haptic([20, 30]); shake = 8; bird.vy = settings.jump * 0.6;
    spawnParticles(bird.x, bird.y, 12, { colors: ['#ff6b6b','#fff'], spdMin: 1, spdMax: 4, g: 0.06, lifeMin: 16, lifeMax: 30, sizeMin: 1.5, sizeMax: 3.5 });
    spawnPopup(bird.x, bird.y - 18, '-3s', '#ff6b6b');
    return;
  }
  die();
}

function endRun(reason) {
  if (state === 'dead') return;
  state = 'dead';
  document.getElementById('pause-btn').classList.add('hidden');
  document.getElementById('go-title').textContent = (reason === 'time') ? 'Tijd op! ⏱' : 'Game Over';
  const beat = score > best && score > 0;
  if (score > best) best = score;
  stats.games++;
  checkAchievements(); // werkt stats bij, kent beloningen toe én slaat op
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = best;
  document.getElementById('run-coins').textContent = runCoins;
  document.getElementById('menu-best').textContent = best;
  updateCoinUI();
  // medaille
  const tier = medalTier(score);
  const mc = document.getElementById('medal-canvas');
  if (tier) {
    drawMedal(mc.getContext('2d'), tier);
    mc.classList.remove('hidden');
    setTimeout(() => sfx('medal'), 350);

  gameoverEl.classList.remove('hidden');
}

}

function drawPipes() {

// ---------- NEON STAD ----------
function drawBgNeon() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a0830'); g.addColorStop(0.5, '#2a0a3a'); g.addColorStop(1, '#0a0712');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  const horizon = H * 0.5;
  // neon zon
  ctx.save(); ctx.shadowColor = '#ff2da0'; ctx.shadowBlur = 30;
  const sg = ctx.createLinearGradient(0, horizon-66, 0, horizon);
  sg.addColorStop(0, '#ffd23f'); sg.addColorStop(1, '#ff2da0');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(W/2, horizon-18, 44, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = g; // strepen over de zon (zelfde achtergrond)
  ctx.fillStyle = '#160a26';
  for (let i = 0; i < 5; i++) ctx.fillRect(W/2-48, horizon-40+i*9, 96, 4);
  // gebouwen op de horizon met neon ramen
  for (let i = 0; i < 7; i++) {
    const bw = W/7, bx = i*bw, bh = 34 + ((i*53) % 4) * 16;
    ctx.fillStyle = '#120a22'; ctx.fillRect(bx+3, horizon-bh, bw-6, bh);
    ctx.fillStyle = (i % 2) ? 'rgba(54,224,255,0.7)' : 'rgba(255,45,160,0.7)';
    for (let wx = bx+8; wx < bx+bw-8; wx += 11)
      for (let wy = horizon-bh+8; wy < horizon-6; wy += 13)
        if (((wx + wy) | 0) % 3) ctx.fillRect(wx, wy, 4, 5);
  }
  // perspectief-vloer
  const gyy = H - 50;
  ctx.strokeStyle = 'rgba(255,45,160,0.3)'; ctx.lineWidth = 1.5;
  for (let i = 1; i <= 7; i++) { const t = i/7, y = horizon + (gyy-horizon)*t*t; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let i = -7; i <= 7; i++) { ctx.beginPath(); ctx.moveTo(W/2 + i*14, horizon); ctx.lineTo(W/2 + i*90, gyy); ctx.stroke(); }
}
function drawGroundNeon() {

// ---------- ONDERWATER ----------
function drawBgOcean() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0b4a6e'); g.addColorStop(0.5, '#0e6f93'); g.addColorStop(1, '#1193a8');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // lichtstralen van boven
  ctx.save();
  ctx.globalAlpha = 0.12; ctx.fillStyle = '#cffcff';
  for (let i = 0; i < 4; i++) {
    const x = (i * 130 + 40);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x+30, 0); ctx.lineTo(x+90, H); ctx.lineTo(x+50, H); ctx.fill();
  }
  ctx.restore();
  // opstijgende bubbels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 14; i++) {
    const bx = (i * 67 + (i*i*13)) % W;
    const by = (H - ((fFrame * (0.6 + (i%3)*0.25) + i*70) % (H + 20)));
    const br = 2 + (i % 3);
    ctx.beginPath(); ctx.arc(bx + Math.sin((by+i)*0.05)*6, by, br, 0, Math.PI*2); ctx.fill();
  }
  // verre vis-silhouetten
  ctx.fillStyle = 'rgba(0,40,60,0.3)';
  for (let i = 0; i < 3; i++) {
    const fx = ((i*180 - fFrame*0.5) % (W+120)+(W+120))%(W+120) - 60;
    const fy = 120 + i*60;
    ctx.beginPath(); ctx.ellipse(fx, fy, 12, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(fx+10, fy); ctx.lineTo(fx+18, fy-5); ctx.lineTo(fx+18, fy+5); ctx.fill();
  }
}
function drawGroundOcean() {
  const gy = H - 50;

}
function drawPipesOcean() {
  const w = 60;

      ctx.fillStyle = g; ctx.fillRect(p.x, y, w, h);

    };

// stenen muur met metselwerk
function stoneFill(x, y, w, h) {
  if (h <= 0) return;
  const g = ctx.createLinearGradient(x, 0, x+w, 0);
  g.addColorStop(0, '#7c7686');
  g.addColorStop(0.5, '#5b5566');
  g.addColorStop(1, '#403b4a');
  ctx.fillStyle = g;
  ctx.fillRect(x, y, w, h);
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.38)';
  ctx.lineWidth = 2;
  const bh = 18, bw = w / 2;
  for (let yy = Math.floor(y/bh)*bh; yy < y+h; yy += bh) {
    ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x+w, yy); ctx.stroke();
    const stagger = ((Math.round(yy/bh)) % 2) ? bw/2 : 0;
    for (let xx = x + stagger; xx < x+w; xx += bw) {
      ctx.beginPath(); ctx.moveTo(xx, yy); ctx.lineTo(xx, yy+bh); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawMerlons(x, y, w, h) {
  const mW = 13, nW = 9, step = mW + nW;
  for (let xx = x; xx < x + w; xx += step) {
    const bw = Math.min(mW, x + w - xx);
    stoneFill(xx, y, bw, h);
  }
}

function drawPipesDark() {
  const w = 60, capH = 16, teeth = 9;
  for (const p of pipes) {
    const by = p.top + p.gap;
    stoneFill(p.x, 0, w, p.top - capH);
    stoneFill(p.x-5, p.top - capH, w+10, capH - teeth);
    drawMerlons(p.x-5, p.top - teeth, w+10, teeth);
    stoneFill(p.x, by + capH, w, H - (by + capH));
    stoneFill(p.x-5, by + teeth, w+10, capH - teeth);
    drawMerlons(p.x-5, by, w+10, teeth);
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x, 0, w, p.top - capH);
    ctx.strokeRect(p.x, by + capH, w, H - (by + capH));
  }
}

// --- Munten in het spel ---
function drawCoins() {
  for (const p of pipes) {

function drawPowerIcon(cx, cy, type) {
  const col = POWER_COLORS[type];
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = col; ctx.shadowBlur = 12;
  ctx.fillStyle = col; ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (type === 'shield') {
    // schildvorm
    ctx.beginPath();
    ctx.moveTo(0, -7); ctx.lineTo(6, -4); ctx.lineTo(6, 2);
    ctx.quadraticCurveTo(6, 6, 0, 8); ctx.quadraticCurveTo(-6, 6, -6, 2);

  } else if (type === 'magnet') {
    // hoefijzer

  } else {
    ctx.font = 'bold 13px Segoe UI'; ctx.fillText('2×', 0, 1);
  }
  ctx.restore();
}

// --- Vogel (skin-afhankelijk) ---
// Tekent de vogel op (0,0) gericht naar rechts; bruikbaar voor spel én previews.
function drawBirdShape(c, skin, anim) {
  const r = 14;
  const flap = Math.sin(anim * 0.35);
  if (skin === 'knight') {
    // cape
    const cw = 3 + flap * 2;
    c.fillStyle = '#3a1d5c';
    c.beginPath();
    c.moveTo(-4, -8);
    c.quadraticCurveTo(-20 - cw, -4 + flap*3, -22 - cw, 10 + flap*4);
    c.quadraticCurveTo(-14, 6, -6, 12);
    c.quadraticCurveTo(-2, 2, -4, -8);
    c.fill();
    // vleugel
    c.save(); c.translate(-2, 0); c.rotate(flap * 0.5);
    c.fillStyle = '#15151c'; c.strokeStyle = '#6b2fb3'; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(0, 0);
    c.quadraticCurveTo(-16, -10, -22, 2);
    c.quadraticCurveTo(-14, 4, 0, 6);
    c.closePath(); c.fill(); c.stroke();
    c.restore();
    // harnas
    const g = c.createLinearGradient(0, -r, 0, r);
    g.addColorStop(0, '#2c2c3a'); g.addColorStop(1, '#121218');
    c.fillStyle = g;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#000'; c.lineWidth = 2; c.stroke();
    // embleem
    c.fillStyle = 'rgba(142,68,173,0.6)';
    c.beginPath(); c.moveTo(-2, 2); c.lineTo(4, -1); c.lineTo(2, 8); c.lineTo(-4, 5); c.closePath(); c.fill();
    // helm
    c.fillStyle = '#1c1c26';
    c.beginPath(); c.arc(4, -5, 10, Math.PI*1.05, Math.PI*2.05);
    c.lineTo(13, -4); c.quadraticCurveTo(6, -2, -4, -3); c.closePath(); c.fill();
    c.strokeStyle = '#000'; c.lineWidth = 1.5; c.stroke();
    // hoorns
    c.fillStyle = '#0c0c10';
    c.beginPath(); c.moveTo(-1, -12); c.quadraticCurveTo(-8, -20, -3, -24); c.quadraticCurveTo(-2, -18, 3, -13); c.fill();
    c.beginPath(); c.moveTo(8, -12); c.quadraticCurveTo(16, -19, 12, -24); c.quadraticCurveTo(10, -18, 5, -13); c.fill();
    // visier
    c.fillStyle = '#000'; c.fillRect(2, -6, 11, 3.5);
    // gloeiende ogen
    c.shadowColor = '#b06bff'; c.shadowBlur = 8; c.fillStyle = '#d9b3ff';
    c.beginPath(); c.arc(6, -4.2, 1.4, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(11, -4.2, 1.4, 0, Math.PI*2); c.fill();
    c.shadowBlur = 0;
  } else if (skin === 'phoenix') {
    const f1 = Math.sin(anim * 0.4), f2 = Math.sin(anim * 0.7 + 1);
    // vlammenstaart (buitenste oranje)
    c.fillStyle = '#ff7a18';
    c.beginPath();
    c.moveTo(-6, -6);
    c.quadraticCurveTo(-22 - f1*4, -10, -29 - f2*5, 0);
    c.quadraticCurveTo(-22, 3, -27 - f1*4, 11);
    c.quadraticCurveTo(-16, 8, -6, 10);
    c.closePath(); c.fill();
    // binnenste gele vlam
    c.fillStyle = '#ffd23f';
    c.beginPath();
    c.moveTo(-6, -2);
    c.quadraticCurveTo(-16 - f2*3, -3, -21 - f1*3, 2);
    c.quadraticCurveTo(-13, 4, -6, 6);
    c.closePath(); c.fill();
    // vleugel (oranje, klapt)
    c.save(); c.translate(-2, 0); c.rotate(flap * 0.5);
    c.fillStyle = '#ff5722'; c.strokeStyle = '#c1370b'; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(0, 0); c.quadraticCurveTo(-15, -9, -21, 2); c.quadraticCurveTo(-13, 4, 0, 6); c.closePath(); c.fill(); c.stroke();
    c.fillStyle = '#ffd23f';
    c.beginPath(); c.moveTo(-21, 2); c.quadraticCurveTo(-13, 4, 0, 6); c.quadraticCurveTo(-10, 2, -21, 2); c.fill();
    c.restore();
    // lichaam (gloeiend rood-oranje verloop)
    c.save();
    c.shadowColor = 'rgba(255,120,30,0.85)'; c.shadowBlur = 12;
    const g = c.createRadialGradient(-3, -3, 2, 0, 0, r + 2);
    g.addColorStop(0, '#ffb13c'); g.addColorStop(1, '#e23a14');
    c.fillStyle = g;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.restore();
    c.strokeStyle = '#a82b08'; c.lineWidth = 1.5; c.stroke();
    // vlammenkam op de kop
    c.fillStyle = '#ffd23f';
    for (let i = 0; i < 3; i++) {
      const bx = -2 + i*5, fh = 8 + Math.sin(anim*0.5 + i) * 2;
      c.beginPath();
      c.moveTo(bx - 3, -10); c.quadraticCurveTo(bx, -10 - fh, bx + 3, -10); c.fill();
    }
    // oog
    c.fillStyle = '#fff'; c.beginPath(); c.arc(7, -4, 4.5, 0, Math.PI*2); c.fill();
    c.fillStyle = '#000'; c.beginPath(); c.arc(9, -4, 2.3, 0, Math.PI*2); c.fill();
    // snavel
    c.fillStyle = '#ffb300';
    c.beginPath(); c.moveTo(12, -1); c.lineTo(22, 2); c.lineTo(12, 5); c.fill();
  } else if (skin === 'robot') {
    // staart-uitlaat met vlammetje
    c.fillStyle = '#5a6478';
    c.fillRect(-r-4, -3, 6, 6);
    c.fillStyle = (Math.sin(anim*0.6) > 0) ? '#36e0ff' : '#8fe9ff';
    c.beginPath(); c.moveTo(-r-4, -3); c.lineTo(-r-12, 0); c.lineTo(-r-4, 3); c.fill();
    // vleugel-paneel (klapt)
    c.save(); c.translate(-2, 0); c.rotate(flap * 0.4);
    c.fillStyle = '#9aa3b8'; c.strokeStyle = '#5a6478'; c.lineWidth = 1.5;
    c.beginPath(); c.rect(-18, -3, 16, 9); c.fill(); c.stroke();
    c.restore();
    // metalen lichaam
    const g = c.createLinearGradient(0, -r, 0, r);
    g.addColorStop(0, '#dfe6f2'); g.addColorStop(0.5, '#aab3c6'); g.addColorStop(1, '#717b92');
    c.fillStyle = g;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#5a6478'; c.lineWidth = 2; c.stroke();
    // schroefjes
    c.fillStyle = '#6b7488';
    c.beginPath(); c.arc(-6, 7, 1.5, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(-8, -4, 1.5, 0, Math.PI*2); c.fill();
    // antenne
    c.strokeStyle = '#5a6478'; c.lineWidth = 2;
    c.beginPath(); c.moveTo(2, -r); c.lineTo(4, -r-9); c.stroke();
    c.save(); c.shadowColor = '#ff4242'; c.shadowBlur = 7; c.fillStyle = '#ff5a5a';
    c.beginPath(); c.arc(4, -r-10, 2.5, 0, Math.PI*2); c.fill(); c.restore();
    // LED-visor
    c.fillStyle = '#1a1f2b'; c.beginPath();
    c.moveTo(-2, -6); c.lineTo(13, -7); c.lineTo(13, 1); c.lineTo(-2, 0); c.closePath(); c.fill();
    c.save(); c.shadowColor = '#36e0ff'; c.shadowBlur = 8; c.fillStyle = '#5cf0ff';
    c.fillRect(2, -5, 8, 3); c.restore();
    // snavel-plaatje
    c.fillStyle = '#c9d2e0';
    c.beginPath(); c.moveTo(12, 1); c.lineTo(21, 3); c.lineTo(12, 6); c.fill();
  } else if (skin === 'ghost') {
    c.save();
    c.globalAlpha = 0.82;
    c.shadowColor = 'rgba(180,210,255,0.7)'; c.shadowBlur = 12;
    // spooklichaam met golvende onderkant
    c.fillStyle = '#eef4ff';
    c.beginPath();
    c.arc(0, -1, r, Math.PI, 0); // bovenkant rond
    const baseY = r - 1;
    c.lineTo(r, baseY);
    const lobes = 4;
    for (let i = 0; i < lobes; i++) {
      const x1 = r - (i*2+1) * (2*r/(lobes*2));
      const x2 = r - (i*2+2) * (2*r/(lobes*2));
      const dip = (Math.sin(anim*0.2 + i) > 0) ? baseY - 5 : baseY;
      c.quadraticCurveTo((x1+x2)/2 + r/(lobes*2), dip + 5, x2, baseY);
    }
    c.lineTo(-r, -1);
    c.closePath(); c.fill();
    c.restore();
    // ogen
    c.globalAlpha = 1;
    c.fillStyle = '#2a3550';
    c.beginPath(); c.arc(2, -4, 3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(11, -4, 3, 0, Math.PI*2); c.fill();
    // mond
    c.beginPath(); c.arc(7, 4, 2.5, 0, Math.PI*2); c.fill();
  } else if (skin === 'ninja') {
    const t = Math.sin(anim * 0.4);
    // wapperende hoofdband-linten achter
    c.fillStyle = '#c0392b';
    c.beginPath(); c.moveTo(-8, -9); c.quadraticCurveTo(-20, -11 + t*4, -27, -5 + t*5); c.quadraticCurveTo(-18, -5, -8, -4); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(-8, -3); c.quadraticCurveTo(-19, 1 + t*5, -25, 7 + t*4); c.quadraticCurveTo(-16, 2, -8, 0); c.closePath(); c.fill();
    // vleugel
    c.save(); c.translate(-2, 0); c.rotate(flap * 0.5);
    c.fillStyle = '#2b2b33'; c.strokeStyle = '#15151a'; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(0, 0); c.quadraticCurveTo(-15, -9, -21, 2); c.quadraticCurveTo(-13, 4, 0, 6); c.closePath(); c.fill(); c.stroke();
    c.restore();
    // donker lichaam
    const g = c.createLinearGradient(0, -r, 0, r);
    g.addColorStop(0, '#3a3a44'); g.addColorStop(1, '#1c1c22');
    c.fillStyle = g; c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#0e0e12'; c.lineWidth = 2; c.stroke();
    // oogspleet + hoofdband (geclipt binnen het lichaam)
    c.save(); c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.clip();
    c.fillStyle = '#cdc6b6'; c.fillRect(-r, -7, 2*r, 8);
    c.fillStyle = '#c0392b'; c.fillRect(-r, -13, 2*r, 6);
    c.fillStyle = '#a52f22'; c.fillRect(-r, -8, 2*r, 1.5);
    c.restore();
    // boze ogen
    c.fillStyle = '#222';
    c.beginPath(); c.moveTo(2, -5.5); c.lineTo(8, -3); c.lineTo(2, -1.5); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(13, -5.5); c.lineTo(9, -3); c.lineTo(13, -1.5); c.closePath(); c.fill();
  } else {
    // klassieke gele vogel
    const wy = 2 + flap * 3;
    c.fillStyle = '#ffd54a';
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#d4a017'; c.lineWidth = 2; c.stroke();
    // buik
    c.fillStyle = '#fff4cf';
    c.beginPath(); c.arc(1, 5, r*0.62, 0, Math.PI*2); c.fill();
    // vleugel
    c.fillStyle = '#fff'; c.strokeStyle = '#d4a017'; c.lineWidth = 1.5;
    c.beginPath(); c.ellipse(-3, wy, 8, 5, flap*0.3, 0, Math.PI*2); c.fill(); c.stroke();
    // oog
    c.fillStyle = '#fff'; c.beginPath(); c.arc(7, -5, 5, 0, Math.PI*2); c.fill();
    c.fillStyle = '#000'; c.beginPath(); c.arc(9, -5, 2.5, 0, Math.PI*2); c.fill();
    // snavel
    c.fillStyle = '#e8772e';
    c.beginPath(); c.moveTo(12, 0); c.lineTo(22, 2); c.lineTo(12, 6); c.fill();
  }
}

function drawBird() {
  // knipperen tijdens onkwetsbaarheid
  if (invulnTimer > 0 && Math.floor(fFrame / 3) % 2 === 0) return;
  // geïnterpoleerde positie/hoek tussen physics-stappen
  const y = bird.prevY != null ? bird.prevY + (bird.y - bird.prevY) * renderAlpha : bird.y;
  const rot = bird.prevRot != null ? bird.prevRot + (bird.rot - bird.prevRot) * renderAlpha : bird.rot;
  ctx.save();
  ctx.translate(bird.x, y);
  ctx.rotate(rot);
  drawBirdShape(ctx, selectedSkin, fFrame);
  ctx.restore();
  // schild-bubbel
  if (shieldActive) {
    ctx.save();
    ctx.translate(bird.x, y);
    const pulse = 1 + Math.sin(fFrame * 0.2) * 0.06;
    ctx.strokeStyle = 'rgba(80,180,255,0.9)'; ctx.lineWidth = 2.5;
    ctx.fillStyle = 'rgba(80,180,255,0.15)';
    ctx.beginPath(); ctx.arc(0, 0, (bird.r + 7) * pulse, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

function drawReady() {
  if (state !== 'ready') return;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.textAlign = 'center';
  ctx.font = 'bold 30px Segoe UI, sans-serif';
  ctx.strokeText('Klaar?', W/2, H/2 - 90); ctx.fillText('Klaar?', W/2, H/2 - 90);

  ctx.fillText('Tik / spatie om te starten', W/2, H/2 - 55);
}

function drawScore() {
  if (state === 'playing') {
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.font = 'bold 48px Segoe UI, sans-serif'; ctx.textAlign = 'center';

}

function drawHud() {
  if (state !== 'playing' && state !== 'ready') return;
  // muntteller deze ronde, linksboven
  ctx.save();
  ctx.translate(22, 30 + uiTop);
  ctx.fillStyle = '#ffcf33'; ctx.strokeStyle = '#c98f10'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#c98f10'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('★', 0, 1);
  ctx.restore();
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
  ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.strokeText(runCoins, 38, 30 + uiTop); ctx.fillText(runCoins, 38, 30 + uiTop);
  ctx.textBaseline = 'alphabetic';
  // aftelklok (Time Attack)
  if (mode === 'time') {
    const secs = Math.ceil(timeLeft / 60);
    const mm = Math.floor(secs / 60), ss = secs % 60;
    const txt = 'TIJD ' + mm + ':' + (ss < 10 ? '0' : '') + ss;
    ctx.font = 'bold 24px Segoe UI'; ctx.textAlign = 'center';
    ctx.lineWidth = 4; ctx.strokeStyle = '#000';
    ctx.fillStyle = (timeLeft < 600 && Math.floor(fFrame/8) % 2 === 0) ? '#ff6b6b' : '#fff';
    ctx.strokeText(txt, W/2, 120 + uiTop); ctx.fillText(txt, W/2, 120 + uiTop);
  }
  // actieve power-up timers, rechtsboven
  const active = [];
  if (shieldActive) active.push({ c: POWER_COLORS.shield, t: -1, label: 'shield' });
  if (magnetTimer > 0) active.push({ c: POWER_COLORS.magnet, t: magnetTimer / POWER_DUR, label: 'magnet' });
  if (doubleTimer > 0) active.push({ c: POWER_COLORS.double, t: doubleTimer / POWER_DUR, label: 'double' });
  let py = 58 + uiTop; // onder de pauzeknop
  for (const a of active) {
    const px = W - 20;
    ctx.fillStyle = a.c;
    ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); ctx.fill();
    if (a.t >= 0) {
      ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(px, py, 9, -Math.PI/2, -Math.PI/2 + Math.PI*2*a.t); ctx.stroke();
    }
    py += 24;
  }
}

// ====================== GAME LOOP ======================
function update() {
  updateParticles(); // deeltjes/pop-ups lopen in elke toestand (ook bij game over)
  // vorige posities bewaren voor vloeiende render-interpolatie
  if (state === 'ready' || state === 'playing') {
    bird.prevY = bird.y;
    bird.prevRot = bird.rot;
  }
  if (state === 'ready') {
    frame++;
    bird.y = H/2 + Math.sin(frame * 0.1) * 8;
    bird.rot = 0;
  }
  if (state === 'playing') {
    frame++;
    if (mode === 'time') { timeLeft--; if (timeLeft <= 0) { timeLeft = 0; endRun('time'); return; } }
    curSpeed = settings.speed + Math.min(score * 0.045, 1.6); // opbouw
    if (magnetTimer > 0) magnetTimer--;
    if (doubleTimer > 0) doubleTimer--;
    if (invulnTimer > 0) invulnTimer--;
    bird.vy += settings.gravity;
    if (bird.vy > settings.maxVy) bird.vy = settings.maxVy;
    bird.y += bird.vy;
    const targetRot = Math.max(-0.5, Math.min(1.4, bird.vy * 0.09));
    bird.rot += (targetRot - bird.rot) * 0.15;

    if (frame % settings.interval === 0) spawnPipe();

    const groundY = H - 50;
    const w = 60;
    const coinRad = magnetTimer > 0 ? (settings.gap/2 + 24) : (bird.r + 11);
    for (const p of pipes) {
      p.prevX = p.x;
      p.x -= curSpeed;
      if (p.driftAmp) p.top = p.baseTop + Math.sin(frame*0.05 + p.driftPhase) * p.driftAmp; // chaos
      if (!p.passed && p.x + w < bird.x) { p.passed = true; score++; sfx('score'); }
      const cx = p.x + 30, cy = p.top + p.gap/2;
      // munt oppakken (grotere reikwijdte tijdens magneet)
      if (p.coin) {
        const dx = bird.x - cx, dy = bird.y - cy;
        if (p.x < bird.x + 40 && dx*dx + dy*dy < coinRad*coinRad) {
          p.coin = false;
          const val = settings.coinValue * (doubleTimer > 0 ? 2 : 1);
          coins += val; runCoins += val; stats.totalCoins += val;
          sfx('coin'); haptic(12);
          spawnParticles(cx, cy, 10, { colors: ['#ffe07a','#ffcf33','#fff7d6'], spdMin: 1, spdMax: 3.5, g: 0.05, lifeMin: 18, lifeMax: 32, sizeMin: 1.5, sizeMax: 3.5 });
          spawnPopup(cx, cy - 14, '+' + val, doubleTimer > 0 ? '#d6b3ff' : '#ffe07a');
          checkAchievements();
          updateCoinUI();
        }
      }
      // power-up oppakken
      if (p.power) {
        const dx = bird.x - cx, dy = bird.y - cy;
        if (dx*dx + dy*dy < (bird.r + 13)*(bird.r + 13)) {
          activatePower(p.power, cx, cy); p.power = null;
        }
      }
      // botsing met buis
      if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + w) {
        if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + p.gap) handleHit();
      }
    }
    pipes = pipes.filter(p => p.x + w > -10);

    if (bird.y + bird.r > groundY) {
      bird.y = groundY - bird.r;
      if (mode === 'time') {
        bird.vy = settings.jump;
        if (invulnTimer <= 0) { timeLeft = Math.max(0, timeLeft - 180); invulnTimer = 45; sfx('hit'); spawnPopup(bird.x, bird.y - 18, '-3s', '#ff6b6b'); }
      } else die();
    }
    if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy = 0; }
  }
}

function render() {
  const shaking = shake > 0.3;
  if (shaking) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  }
  drawBackground();
  // Tijdens het spelen schuift de hele buizen-/muntenwereld vloeiend mee
  // tussen physics-stappen (interpolatie) -> boterzacht op 120Hz-schermen.
  if (state === 'playing') {
    ctx.save();
    ctx.translate(curSpeed * (1 - renderAlpha), 0);
    drawPipes();
    drawCoins();
    ctx.restore();
  } else {
    drawPipes();
    drawCoins();
  }
  drawGround();
  if (state === 'ready' || state === 'playing' || state === 'dead') drawBird();
  drawParticles();
  if (shaking) ctx.restore();
  drawReady();
  drawHud();
  drawScore();
}

// Vaste tijdstap: physics draait altijd op 60 tikken/sec, ongeacht de
// schermverversing (60/120Hz) of opgelopen vertraging. Zo blijft het tempo
// op elke telefoon precies gelijk en niet afhankelijk van de framerate.
const STEP_MS = 1000 / 60;
let _last = 0, _acc = 0, renderAlpha = 0, fFrame = 0;
function loop(now) {
  if (!_last) _last = now;
  _acc += now - _last;
  _last = now;
  if (_acc > 250) _acc = 250; // na tab-wissel niet eindeloos inhalen
  let steps = 0;
  while (_acc >= STEP_MS && steps < 5) { update(); _acc -= STEP_MS; steps++; }
  renderAlpha = _acc / STEP_MS;      // 0..1 fractie tot de volgende physics-stap
  fFrame = frame + renderAlpha;      // vloeiende tijd voor animaties
  render();
  requestAnimationFrame(loop);
}

      btn.textContent = '✓ Geselecteerd'; btn.classList.add('selected'); btn.disabled = true;
    } else if (isOwned) {
      btn.textContent = 'Kies'; btn.classList.add('owned');
      btn.onclick = () => selectItem(isSkin, id);
    } else if (coins >= d.price) {
      btn.textContent = 'Unlock';
      btn.onclick = () => buyItem(isSkin, id);
    } else {
      btn.textContent = '🔒 ' + d.price; btn.classList.add('locked'); btn.disabled = true;
    }

    item.appendChild(cv); item.appendChild(info); item.appendChild(btn);
    wrap.appendChild(item);
  }
}

function buyItem(isSkin, id) {
  const d = (isSkin ? SKINS : THEMES)[id];
  if (coins < d.price) return;
  coins -= d.price;
  (isSkin ? ownedSkins : ownedThemes).push(id);
  sfx('unlock'); haptic([15, 30, 15]);
  selectItem(isSkin, id); // direct selecteren na aankoop (persist gebeurt daar)
  checkAchievements();
}

function selectItem(isSkin, id) {
  if (isSkin) selectedSkin = id; else selectedTheme = id;
  persist();
  renderShop();
}

// ====================== INPUT & KNOPPEN ======================
function onInput(e) {
  if (e.code !== 'Space' && e.code !== 'ArrowUp') return;
  if (state !== 'ready' && state !== 'playing') return; // laat typen in velden ongemoeid
  e.preventDefault();
  flap();
}
window.addEventListener('keydown', onInput);
canvas.addEventListener('mousedown', () => { ensureAudio(); if (state === 'ready' || state === 'playing') flap(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); ensureAudio(); if (state === 'ready' || state === 'playing') flap(); }, { passive: false });

// kleine klik bij elke knop + audio activeren bij eerste interactie (iOS-vereiste)
document.querySelectorAll('.btn, .tab, .diff-btn, .mode-btn, .textlink').forEach(b => {
  b.addEventListener('click', () => { ensureAudio(); sfx('click'); });
});

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('menu-btn').addEventListener('click', toMenu);
document.getElementById('shop-btn').addEventListener('click', openShop);
document.getElementById('shop-back').addEventListener('click', closeShop);

// Pauze
document.getElementById('pause-btn').addEventListener('click', (e) => { e.stopPropagation(); pauseGame(); });
document.getElementById('resume-btn').addEventListener('click', resumeGame);
document.getElementById('pause-menu-btn').addEventListener('click', toMenu);
window.addEventListener('keydown', (e) => {
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    if (state === 'playing' || state === 'ready') pauseGame();
    else if (state === 'paused') resumeGame();
  }
});

// Instellingen
const settingsEl = document.getElementById('settings');
function refreshToggles() {
  document.getElementById('toggle-sound').classList.toggle('on', soundOn);
  document.getElementById('toggle-haptics').classList.toggle('on', hapticsOn);
}
document.getElementById('settings-btn').addEventListener('click', () => {
  menuEl.classList.add('hidden'); settingsEl.classList.remove('hidden'); refreshToggles();
});
document.getElementById('settings-back').addEventListener('click', () => {
  settingsEl.classList.add('hidden'); menuEl.classList.remove('hidden');
});
document.getElementById('toggle-sound').addEventListener('click', () => {
  soundOn = !soundOn; localStorage.setItem('flappySound', soundOn ? '1' : '0');
  refreshToggles(); if (soundOn) { ensureAudio(); sfx('click'); }
});
document.getElementById('toggle-haptics').addEventListener('click', () => {
  hapticsOn = !hapticsOn; localStorage.setItem('flappyHaptics', hapticsOn ? '1' : '0');
  refreshToggles(); haptic(25);
});

// Prestaties
const achEl = document.getElementById('achievements');
function renderAchievements() {
  const list = document.getElementById('ach-list');
  list.innerHTML = '';
  for (const a of ACHIEVEMENTS) {
    const done = achievements.indexOf(a.id) !== -1;
    const it = document.createElement('div');
    it.className = 'ach-item' + (done ? ' done' : '');
    it.innerHTML =
      '<div class="ach-icon">' + (done ? '🏆' : '🔒') + '</div>' +
      '<div class="ach-info"><div class="ach-name">' + escapeHtml(a.name) + '</div>' +
      '<div class="ach-desc">' + escapeHtml(a.desc) + '</div></div>' +
      '<div class="ach-reward">+' + a.reward + ' 🪙</div>';
    list.appendChild(it);
  }
}
document.getElementById('ach-btn').addEventListener('click', () => {
  menuEl.classList.add('hidden'); achEl.classList.remove('hidden'); renderAchievements();
});
document.getElementById('ach-back').addEventListener('click', () => {
  achEl.classList.add('hidden'); menuEl.classList.remove('hidden');
});

document.querySelectorAll('#difficulty .diff-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#difficulty .diff-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    diff = b.dataset.diff;
  });
});
document.querySelectorAll('#modesel .mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#modesel .mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.mode;
  });
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    shopTab = t.dataset.tab;
    renderShop();
  });
});

// ====================== PROFIELEN / LOGIN ======================
const loginEl = document.getElementById('login');

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function showLogin() {
  state = 'menu';
  menuEl.classList.add('hidden');
  shopEl.classList.add('hidden');
  gameoverEl.classList.add('hidden');
  loginEl.classList.remove('hidden');
  renderProfiles();
}

function renderProfiles() {
  const list = document.getElementById('profile-list');
  list.innerHTML = '';
  const names = Object.keys(profiles);
  if (names.length === 0) {
    const e = document.createElement('p');
    e.className = 'hint';
    e.textContent = 'Nog geen spelers — maak er hieronder een aan.';
    list.appendChild(e);
  }
  names.forEach(name => {
    const d = profiles[name] || defaultProfileData();
    const row = document.createElement('div'); row.className = 'profile-row';
    const pick = document.createElement('button'); pick.className = 'btn profile-pick';
    pick.innerHTML = '<span>' + escapeHtml(name) + '</span><small>🪙 ' + (d.coins||0) + '  ·  🏆 ' + (d.best||0) + '</small>';
    pick.onclick = () => chooseProfile(name);
    const del = document.createElement('button'); del.className = 'profile-del'; del.textContent = '✕'; del.title = 'Verwijderen';
    del.onclick = (ev) => { ev.stopPropagation(); if (confirm('Speler "' + name + '" verwijderen?')) deleteProfile(name); };
    row.appendChild(pick); row.appendChild(del);
    list.appendChild(row);
  });
}

function chooseProfile(name) {
  activeProfile = name;
  loadActive();
  persist();
  document.getElementById('menu-name').textContent = name;
  document.getElementById('menu-best').textContent = best;
  updateCoinUI();
  loginEl.classList.add('hidden');
  menuEl.classList.remove('hidden');
  setTimeout(claimDaily, 400);
}

function addProfile() {
  const inp = document.getElementById('new-name');
  const name = (inp.value || '').trim().slice(0, 16);
  if (!name) { inp.focus(); return; }
  if (!profiles[name]) {
    profiles[name] = defaultProfileData();
    localStorage.setItem('flappyProfiles', JSON.stringify(profiles));
  }
  inp.value = '';
  chooseProfile(name);
}

function deleteProfile(name) {
  delete profiles[name];
  localStorage.setItem('flappyProfiles', JSON.stringify(profiles));
  if (activeProfile === name) {
    activeProfile = null;
    localStorage.removeItem('flappyActiveProfile');
  }
  renderProfiles();
}

document.getElementById('switch-btn').addEventListener('click', showLogin);
document.getElementById('add-profile').addEventListener('click', addProfile);
document.getElementById('new-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addProfile();
});

// ====================== INIT ======================
reset();
requestAnimationFrame(loop);
if (activeProfile && profiles[activeProfile]) {
  loadActive();
  document.getElementById('menu-name').textContent = activeProfile;
  document.getElementById('menu-best').textContent = best;
  updateCoinUI();
  setTimeout(claimDaily, 600);
} else {
  showLogin();
}
</script>
</body>
</html>
